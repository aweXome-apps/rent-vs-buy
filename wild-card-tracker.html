<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamondbacks Wild Card Tracker</title>
    <style>
        :root {
            --bg: #f7f7f7;
            --fg: #222;
            --muted: #666;
            --card-bg: #fff;
            --border: #e0e0e0;
            --th-bg: #333;
            --th-fg: #fff;
            --row-in-bg: #e9f7ef;
            --row-out-bg: #fff;
            --cutline-color: #333;
            --shadow: rgba(0,0,0,0.15);
            --swatch-out-bg: #eee;
            --swatch-out-border: #ccc;
            --error-bg: #fdecea;
            --error-fg: #611a15;
            --error-border: #f5c6cb;
            --btn-bg: #007BFF;
            --btn-hover: #0056b3;
            --btn-disabled: #99c2ff;
            --hero-bg: #fff;
            --dbacks-color: #A71930;
            --health-good: #1a7d3a;
            --health-watch: #b8860b;
            --health-danger: #c0392b;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #14161a;
                --fg: #e8e8ea;
                --muted: #9aa0a8;
                --card-bg: #1f2228;
                --border: #33373f;
                --th-bg: #0c0d10;
                --th-fg: #e8e8ea;
                --row-in-bg: #163523;
                --row-out-bg: #1f2228;
                --cutline-color: #e8e8ea;
                --shadow: rgba(0,0,0,0.5);
                --swatch-out-bg: #2a2d33;
                --swatch-out-border: #444;
                --error-bg: #3a1f1f;
                --error-fg: #ffb3ac;
                --error-border: #6b2b2b;
                --btn-bg: #2f8bff;
                --btn-hover: #1f6fd6;
                --btn-disabled: #274668;
                --hero-bg: #1f2228;
                --dbacks-color: #ff5468;
                --health-good: #3ddc73;
                --health-watch: #e8b93a;
                --health-danger: #ff6b6b;
            }
        }
        body { font-family: Arial, sans-serif; margin: 20px; background: var(--bg); color: var(--fg); }
        h1 { color: var(--fg); margin-bottom: 4px; }
        .subtitle { color: var(--muted); margin-top: 0; margin-bottom: 20px; }
        .controls {
            display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
            margin-bottom: 16px;
        }
        button {
            padding: 8px 16px; background-color: var(--btn-bg); color: white;
            border: none; border-radius: 4px; cursor: pointer; font-size: 14px;
        }
        button:hover { background-color: var(--btn-hover); }
        button:disabled { background-color: var(--btn-disabled); cursor: default; }
        #lastUpdated { color: var(--muted); font-size: 13px; }
        #cacheNote { color: var(--muted); font-size: 12px; font-style: italic; }
        #errorBanner {
            display: none; background: var(--error-bg); color: var(--error-fg); border: 1px solid var(--error-border);
            padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; font-size: 14px;
        }

        .hero-card {
            display: none; align-items: center; gap: 16px;
            background: var(--hero-bg); border-radius: 8px; padding: 16px 20px;
            margin-bottom: 16px; box-shadow: 0 1px 3px var(--shadow);
            border-left: 6px solid var(--dbacks-color);
        }
        .hero-logo { width: 56px; height: 56px; object-fit: contain; flex-shrink: 0; }
        .hero-body { display: flex; flex-direction: column; gap: 4px; }
        .hero-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .hero-rank { font-size: 13px; color: var(--muted); }
        .hero-game { font-size: 20px; font-weight: bold; color: var(--fg); }
        .hero-race { font-size: 14px; font-weight: bold; color: var(--dbacks-color); }
        .health-badge {
            display: inline-block; margin-left: 6px; padding: 2px 8px; border-radius: 10px;
            font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.03em;
            color: #fff; vertical-align: middle; cursor: help;
        }
        .health-good { background: var(--health-good); }
        .health-watch { background: var(--health-watch); color: #1a1a1a; }
        .health-danger { background: var(--health-danger); }

        .table-wrap { overflow-x: auto; border-radius: 6px; box-shadow: 0 1px 3px var(--shadow); }
        table { border-collapse: collapse; width: 100%; min-width: 640px; background: var(--card-bg); display: none; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
        th { background: var(--th-bg); color: var(--th-fg); font-size: 13px; text-transform: uppercase; letter-spacing: 0.03em; }
        tbody tr { border-left: 4px solid transparent; }
        tbody tr.wc-in { background: var(--row-in-bg); border-left-color: var(--team-color, transparent); }
        tbody tr.wc-out { background: var(--row-out-bg); border-left-color: var(--team-color, transparent); }
        tbody tr.dbacks-row { background: var(--dbacks-color) !important; color: #fff; font-weight: bold; border-left-color: var(--dbacks-color); }
        tbody tr.dbacks-row .badge { border: 1px solid rgba(255,255,255,0.6); }
        tr.cutline td { border-bottom: 3px solid var(--cutline-color); }
        .rank-cell { font-weight: bold; width: 36px; }
        .team-cell { display: inline-flex; align-items: center; gap: 8px; }
        .team-logo { width: 22px; height: 22px; object-fit: contain; flex-shrink: 0; }
        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px;
            font-weight: bold; color: #fff;
        }
        .badge-live { background: #e63946; }
        .badge-final { background: #6c757d; }
        .badge-scheduled { background: #007BFF; }
        .streak-w { color: #1a7d3a; font-weight: bold; }
        .streak-l { color: #c0392b; font-weight: bold; }
        .dbacks-row .streak-w, .dbacks-row .streak-l { color: #fff; }

        @keyframes scoreFlash {
            0% { background-color: rgba(255, 214, 0, 0.6); }
            100% { background-color: transparent; }
        }
        tr.score-flash td { animation: scoreFlash 1.8s ease-out; }

        .legend { margin-top: 14px; font-size: 13px; color: var(--muted); }
        .legend span { display: inline-flex; align-items: center; margin-right: 16px; }
        .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; margin-right: 6px; }
        .swatch-in { background: #b6e8ca; }
        .swatch-out { background: var(--swatch-out-bg); border: 1px solid var(--swatch-out-border); }
        .swatch-dbacks { background: var(--dbacks-color); }
        #emptyMsg { display: none; padding: 20px; text-align: center; color: var(--muted); background: var(--card-bg); border-radius: 6px; }
        #loadingMsg { color: var(--muted); }

        @media (max-width: 640px) {
            table { min-width: 0; width: 100%; }
            thead, tbody, tr, td { display: block; width: 100%; box-sizing: border-box; }
            thead { position: absolute; left: -9999px; }
            tbody tr {
                margin-bottom: 12px; border-radius: 8px; box-shadow: 0 1px 3px var(--shadow);
                overflow: hidden; border-left-width: 4px;
            }
            tbody tr:last-child { margin-bottom: 0; }
            td {
                display: flex; justify-content: space-between; align-items: center;
                white-space: normal; text-align: right; gap: 12px;
            }
            td::before {
                content: attr(data-label); font-weight: bold; color: var(--muted);
                text-align: left; flex-shrink: 0;
            }
            .dbacks-row td::before { color: rgba(255,255,255,0.8); }
            td:last-child { border-bottom: none; }
            /* On desktop the cutline is one border under the row 3 <tr>; on mobile each <td>
               is its own block, so move the divider onto the card itself instead of every field. */
            tr.cutline { border-bottom: 4px solid var(--cutline-color); margin-bottom: 16px; }
            tr.cutline td { border-bottom: 1px solid var(--border); }
            tr.cutline td:last-child { border-bottom: none; }
        }
    </style>
</head>
<body>
    <h1>Diamondbacks Wild Card Tracker</h1>
    <p class="subtitle">National League Wild Card race &mdash; live scores and standings</p>

    <div class="controls">
        <button id="refreshBtn" onclick="refreshAll()">Refresh</button>
        <span id="lastUpdated"></span>
        <span id="cacheNote"></span>
    </div>

    <div id="errorBanner"></div>

    <div id="dbacksHero" class="hero-card"></div>

    <div class="table-wrap">
        <table id="standingsTable">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Team</th>
                    <th>W-L</th>
                    <th>GB</th>
                    <th>Streak</th>
                    <th>Today / Next Game</th>
                </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
        </table>
    </div>
    <div id="emptyMsg">No wild card standings available right now (likely off-season).</div>
    <div id="loadingMsg" style="padding: 20px; text-align: center;">Loading standings&hellip;</div>

    <div class="legend">
        <span><span class="swatch swatch-in"></span>Holding a wild card spot (top 3)</span>
        <span><span class="swatch swatch-out"></span>Outside the wild card line</span>
        <span><span class="swatch swatch-dbacks"></span>Arizona Diamondbacks</span>
    </div>

    <script>
        const DBACKS_TEAM_ID = 109;
        const NL_LEAGUE_ID = 104;
        const API_BASE = 'https://statsapi.mlb.com/api/v1';
        const POLL_LIVE_MS = 30000;
        const POLL_IDLE_MS = 300000;
        const WILD_CARD_SPOTS = 3;
        const TOTAL_SEASON_GAMES = 162;
        const CACHE_KEY = 'wcTracker:v1';

        // Static team branding lookup — the 15 NL teams `fetchStandings` can ever return.
        // Colors are each team's primary brand color; logos are MLB's official static CDN,
        // which is stable/public but unverified for CORS from this sandbox, so every <img>
        // using it has an onerror fallback that just removes itself rather than breaking layout.
        const TEAM_META = {
            109: { color: '#A71930', logo: 'https://www.mlbstatic.com/team-logos/109.svg' }, // Diamondbacks
            144: { color: '#13274F', logo: 'https://www.mlbstatic.com/team-logos/144.svg' }, // Braves
            112: { color: '#0E3386', logo: 'https://www.mlbstatic.com/team-logos/112.svg' }, // Cubs
            113: { color: '#C6011F', logo: 'https://www.mlbstatic.com/team-logos/113.svg' }, // Reds
            115: { color: '#33006F', logo: 'https://www.mlbstatic.com/team-logos/115.svg' }, // Rockies
            119: { color: '#005A9C', logo: 'https://www.mlbstatic.com/team-logos/119.svg' }, // Dodgers
            146: { color: '#00A3E0', logo: 'https://www.mlbstatic.com/team-logos/146.svg' }, // Marlins
            158: { color: '#12284B', logo: 'https://www.mlbstatic.com/team-logos/158.svg' }, // Brewers
            121: { color: '#002D72', logo: 'https://www.mlbstatic.com/team-logos/121.svg' }, // Mets
            143: { color: '#E81828', logo: 'https://www.mlbstatic.com/team-logos/143.svg' }, // Phillies
            134: { color: '#FDB827', logo: 'https://www.mlbstatic.com/team-logos/134.svg' }, // Pirates
            135: { color: '#2F241D', logo: 'https://www.mlbstatic.com/team-logos/135.svg' }, // Padres
            137: { color: '#FD5A1E', logo: 'https://www.mlbstatic.com/team-logos/137.svg' }, // Giants
            138: { color: '#C41E3A', logo: 'https://www.mlbstatic.com/team-logos/138.svg' }, // Cardinals
            120: { color: '#AB0003', logo: 'https://www.mlbstatic.com/team-logos/120.svg' }, // Nationals
        };

        let currentStandings = [];
        let pollTimer = null;
        let inFlight = false;

        function getCurrentSeason() {
            return new Date().getFullYear();
        }

        function toDateStr(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        }

        function todayStr() {
            return toDateStr(new Date());
        }

        function addDays(dateStr, days) {
            const d = new Date(dateStr + 'T00:00:00');
            d.setDate(d.getDate() + days);
            return toDateStr(d);
        }

        function hideLoading() {
            document.getElementById('loadingMsg').style.display = 'none';
        }

        function showError(message) {
            hideLoading();
            const banner = document.getElementById('errorBanner');
            banner.textContent = message;
            banner.style.display = 'block';
        }

        function clearError() {
            const banner = document.getElementById('errorBanner');
            banner.style.display = 'none';
            banner.textContent = '';
        }

        function formatGamesBack(gb) {
            if (gb <= 0.05) return '-';
            return gb.toFixed(1);
        }

        function saveCachedSnapshot(standings) {
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify({ v: 1, savedAt: Date.now(), standings }));
            } catch (e) {
                // localStorage unavailable (private browsing, quota, etc). Instant-load caching
                // is a nice-to-have, not a requirement, so just skip it silently.
            }
        }

        function loadCachedSnapshot() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (parsed?.v !== 1 || !Array.isArray(parsed.standings) || parsed.standings.length === 0) return null;
                return parsed;
            } catch (e) {
                return null;
            }
        }

        // Official MLB tiebreaker order (since the 2022 rule change that replaced Game 163
        // tiebreaker games with a statistical procedure): (1) head-to-head season series,
        // (2) intradivision record, (3) interdivision (in-league) record, then further
        // second-half-of-season splits that require full game-log history we don't pull here.
        // We implement (1)-(3), which resolve the overwhelming majority of real ties, and fall
        // back to a stable alphabetical order if a tie somehow survives all three.
        function findSplitRecord(list, matchFn) {
            if (!Array.isArray(list)) return null;
            const entry = list.find(matchFn);
            if (!entry || typeof entry.wins !== 'number' || typeof entry.losses !== 'number') return null;
            const { wins, losses } = entry;
            return { wins, losses, pct: (wins + losses) > 0 ? wins / (wins + losses) : null };
        }

        function intradivisionRecord(team) {
            return findSplitRecord(team.splitRecords?.divisionRecords, (e) => e.division?.id === team.divisionId);
        }

        function interdivisionRecord(team) {
            const leagueRec = findSplitRecord(team.splitRecords?.leagueRecords, (e) => e.league?.id === NL_LEAGUE_ID);
            const divRec = intradivisionRecord(team);
            if (!leagueRec || !divRec) return null;
            const wins = leagueRec.wins - divRec.wins;
            const losses = leagueRec.losses - divRec.losses;
            if (wins < 0 || losses < 0) return null;
            return { wins, losses, pct: (wins + losses) > 0 ? wins / (wins + losses) : null };
        }

        async function fetchHeadToHead(teamAId, teamBId, season) {
            const url = `${API_BASE}/schedule?sportId=1&teamId=${teamAId}&opponentId=${teamBId}&season=${season}&gameType=R`;
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                let aWins = 0;
                let bWins = 0;
                for (const dateEntry of (data?.dates || [])) {
                    for (const game of (dateEntry.games || [])) {
                        if (game.status?.abstractGameState !== 'Final') continue;
                        const home = game.teams?.home;
                        const away = game.teams?.away;
                        if (!home || !away) continue;
                        const homeWon = home.isWinner === true || (typeof home.score === 'number' && typeof away.score === 'number' && home.score > away.score);
                        const winnerId = homeWon ? home.team?.id : away.team?.id;
                        if (winnerId === teamAId) aWins += 1;
                        else if (winnerId === teamBId) bWins += 1;
                    }
                }
                return { aWins, bWins };
            } catch (e) {
                return null;
            }
        }

        // Resolves the order within a group of teams tied on winning percentage, using the
        // official tiebreaker chain. Mutates nothing; returns a new array in tiebreak order.
        async function resolveTiedGroup(teams, season) {
            if (teams.length < 2) return teams;
            const h2h = new Map();
            const pairs = [];
            for (let i = 0; i < teams.length; i++) {
                for (let j = i + 1; j < teams.length; j++) pairs.push([teams[i], teams[j]]);
            }
            await Promise.all(pairs.map(async ([a, b]) => {
                const record = await fetchHeadToHead(a.teamId, b.teamId, season);
                if (!record) return;
                // Array.prototype.sort's comparator may be called with either argument order,
                // so both directions of the lookup need to resolve to a consistent result.
                h2h.set(`${a.teamId}:${b.teamId}`, record);
                h2h.set(`${b.teamId}:${a.teamId}`, { aWins: record.bWins, bWins: record.aWins });
            }));

            function compare(a, b) {
                const rec = h2h.get(`${a.teamId}:${b.teamId}`);
                if (rec && rec.aWins !== rec.bWins) return rec.aWins > rec.bWins ? -1 : 1;

                const divA = intradivisionRecord(a);
                const divB = intradivisionRecord(b);
                if (divA?.pct != null && divB?.pct != null && divA.pct !== divB.pct) return divB.pct - divA.pct;

                const interA = interdivisionRecord(a);
                const interB = interdivisionRecord(b);
                if (interA?.pct != null && interB?.pct != null && interA.pct !== interB.pct) return interB.pct - interA.pct;

                return a.teamName.localeCompare(b.teamName);
            }

            return [...teams].sort(compare);
        }

        async function fetchStandings(season) {
            // Pull full regular-season standings (all 3 NL divisions) rather than relying on the
            // API's own "wildCard" standings type, and derive the wild card pool ourselves from
            // each team's live divisionRank. That way, the moment a division leader slips to 2nd
            // place, they fall out of `leaderIds` on the very next poll and are recomputed into
            // (or out of) the wild card field automatically — no separate detection logic needed.
            const url = `${API_BASE}/standings?leagueId=${NL_LEAGUE_ID}&season=${season}&standingsTypes=regularSeason`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Standings request failed (HTTP ${res.status})`);
            const data = await res.json();
            const records = data?.records || [];

            const allTeams = [];
            const leaderIds = new Set();
            for (const record of records) {
                for (const tr of (record.teamRecords || [])) {
                    const team = {
                        teamId: tr.team?.id,
                        teamName: tr.team?.name || 'Unknown',
                        divisionId: record.division?.id,
                        divisionRank: parseInt(tr.divisionRank, 10) || 999,
                        wins: tr.wins ?? 0,
                        losses: tr.losses ?? 0,
                        pct: parseFloat(tr.winningPercentage) || 0,
                        streak: tr.streak?.streakCode || '—',
                        splitRecords: tr.records || null,
                    };
                    allTeams.push(team);
                    if (team.divisionRank === 1) leaderIds.add(team.teamId);
                }
            }

            const wildCardPool = allTeams.filter((t) => !leaderIds.has(t.teamId));
            wildCardPool.sort((a, b) => b.pct - a.pct || (b.wins - b.losses) - (a.wins - a.losses));

            // Resolve ties (identical winning percentage) using the official tiebreaker chain,
            // one contiguous group at a time, so a division leader's win last night that breaks
            // a tie shows up correctly on the very next refresh just like everything else here.
            let i = 0;
            while (i < wildCardPool.length) {
                let j = i + 1;
                while (j < wildCardPool.length && Math.abs(wildCardPool[j].pct - wildCardPool[i].pct) < 0.0005) j++;
                if (j - i > 1) {
                    const resolved = await resolveTiedGroup(wildCardPool.slice(i, j), season);
                    wildCardPool.splice(i, j - i, ...resolved);
                }
                i = j;
            }

            // GB is measured against whoever holds the last available wild card spot (3rd place
            // in the pool), not the pool leader — so it reads as "games behind clinching a spot"
            // for teams on the outside, and "-" for the teams currently holding one.
            const cutlineIndex = Math.min(WILD_CARD_SPOTS, wildCardPool.length) - 1;
            const cutlineTeam = cutlineIndex >= 0 ? wildCardPool[cutlineIndex] : null;
            wildCardPool.forEach((t, i) => {
                t.wildCardRank = i + 1;
                t.gamesBack = cutlineTeam
                    ? formatGamesBack(((cutlineTeam.wins - t.wins) + (t.losses - cutlineTeam.losses)) / 2)
                    : '—';
            });

            return wildCardPool;
        }

        async function fetchTodaysGames(dateStr) {
            const url = `${API_BASE}/schedule?sportId=1&date=${dateStr}&hydrate=team,linescore`;
            const res = await fetch(url);
            if (!res.ok) throw new Error(`Schedule request failed (HTTP ${res.status})`);
            const data = await res.json();
            const games = data?.dates?.[0]?.games || [];
            const map = new Map();
            for (const game of games) {
                const away = game.teams?.away;
                const home = game.teams?.home;
                const status = game.status || {};
                const linescore = game.linescore || {};
                const info = {
                    status: status.abstractGameState || 'Unknown',
                    detailedState: status.detailedState || '',
                    inning: linescore.currentInningOrdinal || '',
                    inningState: linescore.inningState || '',
                    awayTeamId: away?.team?.id,
                    homeTeamId: home?.team?.id,
                    awayName: away?.team?.name || 'Away',
                    homeName: home?.team?.name || 'Home',
                    awayScore: away?.score,
                    homeScore: home?.score,
                    gameDate: game.gameDate,
                };
                if (info.awayTeamId) map.set(info.awayTeamId, { ...info, isHome: false, opponentName: info.homeName });
                if (info.homeTeamId) map.set(info.homeTeamId, { ...info, isHome: true, opponentName: info.awayName });
            }
            return map;
        }

        async function fetchNextGame(teamId, fromDate) {
            const endDate = addDays(fromDate, 14);
            const url = `${API_BASE}/schedule?sportId=1&teamId=${teamId}&startDate=${fromDate}&endDate=${endDate}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return null;
                const data = await res.json();
                for (const dateEntry of (data?.dates || [])) {
                    const game = dateEntry.games?.[0];
                    if (game) {
                        const isHome = game.teams?.home?.team?.id === teamId;
                        const opponent = isHome ? game.teams?.away?.team?.name : game.teams?.home?.team?.name;
                        return { gameDate: game.gameDate, opponent: opponent || 'TBD', isHome };
                    }
                }
            } catch (e) {
                return null;
            }
            return null;
        }

        async function mergeGameDataIntoStandings(standings, todaysGamesMap) {
            const from = todayStr();
            const needsNextGame = [];
            for (const team of standings) {
                const game = team.teamId ? todaysGamesMap.get(team.teamId) : null;
                if (game) {
                    team.todayGame = game;
                } else {
                    needsNextGame.push(team);
                }
            }
            await Promise.all(needsNextGame.map(async (team) => {
                if (!team.teamId) return;
                team.nextGame = await fetchNextGame(team.teamId, from);
            }));
            return standings;
        }

        function formatGameCell(team) {
            if (team.todayGame) {
                const g = team.todayGame;
                const myScore = g.isHome ? g.homeScore : g.awayScore;
                const oppScore = g.isHome ? g.awayScore : g.homeScore;
                const vsAt = g.isHome ? 'vs' : '@';
                let badgeClass = 'badge-scheduled';
                let badgeText = 'Scheduled';
                let scoreText = '';
                if (g.status === 'Live') {
                    badgeClass = 'badge-live';
                    badgeText = g.inningState && g.inning ? `${g.inningState} ${g.inning}` : 'Live';
                    scoreText = `${myScore ?? 0}-${oppScore ?? 0}`;
                } else if (g.status === 'Final') {
                    badgeClass = 'badge-final';
                    badgeText = 'Final';
                    scoreText = `${myScore ?? 0}-${oppScore ?? 0}`;
                } else {
                    const time = g.gameDate ? new Date(g.gameDate).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) : '';
                    scoreText = time;
                }
                return `<span class="badge ${badgeClass}">${badgeText}</span> ${vsAt} ${g.opponentName} ${scoreText ? `&mdash; ${scoreText}` : ''}`;
            }
            if (team.nextGame) {
                const ng = team.nextGame;
                const vsAt = ng.isHome ? 'vs' : '@';
                const dateText = ng.gameDate
                    ? new Date(ng.gameDate).toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' +
                      new Date(ng.gameDate).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' })
                    : 'TBD';
                return `<span class="badge badge-scheduled">Next</span> ${dateText} ${vsAt} ${ng.opponent}`;
            }
            return '<span class="badge badge-scheduled">TBD</span>';
        }

        function findByRank(standings, rank) {
            return standings.find((t) => t.wildCardRank === rank) || null;
        }

        // Standard sports "magic number" formula: for a fixed-length season, team A has
        // clinched ahead of team B once A.wins + B.losses >= games + 1, i.e.
        // M = (games + 1) - A.wins - B.losses. Since the wild card pool is a strict rank
        // order, the tightest possible threat to a team holding a spot is whichever team
        // is immediately outside (rank 4), and the target for a team outside is whoever
        // holds the last spot (rank 3) — so comparing against those specific teams is the
        // real constraint, not a simplification.
        function computeDbacksRaceNumber(standings) {
            const dbacks = standings.find((t) => t.teamId === DBACKS_TEAM_ID);
            if (!dbacks) return null;
            const gamesRemaining = Math.max(0, TOTAL_SEASON_GAMES - dbacks.wins - dbacks.losses);
            if (dbacks.wildCardRank <= WILD_CARD_SPOTS) {
                const rival = findByRank(standings, WILD_CARD_SPOTS + 1);
                if (!rival) return null;
                const magic = Math.max(0, (TOTAL_SEASON_GAMES + 1) - dbacks.wins - rival.losses);
                return { type: 'magic', value: magic, gamesRemaining };
            }
            const rival = findByRank(standings, WILD_CARD_SPOTS);
            if (!rival) return null;
            const elimination = Math.max(0, (TOTAL_SEASON_GAMES + 1) - rival.wins - dbacks.losses);
            return { type: 'elimination', value: elimination, gamesRemaining };
        }

        // The same magic/elimination number means very different things depending on how much
        // season is left — 63 with 140 games to go is nothing, 63 with 62 games left is dire.
        // This compares the number to the Diamondbacks' own remaining games as a simple,
        // transparent pace signal. It is a heuristic gut-check, not a probability model: it
        // doesn't know about the rival's remaining schedule, injuries, etc. — just "how big is
        // this number relative to how much season is left to move it."
        function computeRaceHealth(raceNumber) {
            if (!raceNumber || raceNumber.value === 0) return null;
            if (raceNumber.gamesRemaining <= 0) return { key: 'danger', label: 'Season Over', ratio: Infinity };
            const ratio = raceNumber.value / raceNumber.gamesRemaining;
            if (raceNumber.type === 'magic') {
                if (ratio <= 0.5) return { key: 'good', label: 'Clinching Soon', ratio };
                if (ratio <= 1.0) return { key: 'watch', label: 'Race Tightening', ratio };
                return { key: 'danger', label: 'Wide Open', ratio };
            }
            if (ratio <= 0.5) return { key: 'good', label: 'On Pace', ratio };
            if (ratio <= 1.0) return { key: 'watch', label: 'In Danger', ratio };
            return { key: 'danger', label: 'Basically Hopeless', ratio };
        }

        function renderHeroCard(standings) {
            const hero = document.getElementById('dbacksHero');
            if (!hero) return;
            const dbacks = standings.find((t) => t.teamId === DBACKS_TEAM_ID);
            if (!dbacks) {
                hero.style.display = 'none';
                return;
            }
            hero.style.display = 'flex';
            const meta = TEAM_META[DBACKS_TEAM_ID];
            const raceNumber = computeDbacksRaceNumber(standings);
            let raceText = '';
            let healthBadge = '';
            if (raceNumber) {
                if (raceNumber.type === 'magic') {
                    raceText = raceNumber.value === 0
                        ? 'Clinched a wild card berth'
                        : `Magic Number: ${raceNumber.value}`;
                } else {
                    raceText = raceNumber.value === 0
                        ? 'Eliminated from wild card contention'
                        : `Elimination Number: ${raceNumber.value}`;
                }
                const health = computeRaceHealth(raceNumber);
                if (health) {
                    const pct = Number.isFinite(health.ratio) ? Math.round(health.ratio * 100) : null;
                    const title = pct != null
                        ? `${raceNumber.value} needed vs ${raceNumber.gamesRemaining} games left (${pct}% of remaining games) — a pace heuristic, not a probability model`
                        : 'No games remaining this season';
                    healthBadge = `<span class="health-badge health-${health.key}" title="${title}">${health.label}</span>`;
                }
            }
            hero.innerHTML = `
                <img class="hero-logo" src="${meta?.logo || ''}" alt="" loading="lazy" onerror="this.style.display='none'">
                <div class="hero-body">
                    <div class="hero-label">Arizona Diamondbacks</div>
                    <div class="hero-rank">Wild Card Rank #${dbacks.wildCardRank} &middot; ${dbacks.wins}-${dbacks.losses} &middot; GB ${dbacks.gamesBack}</div>
                    <div class="hero-game">${formatGameCell(dbacks)}</div>
                    ${raceText ? `<div class="hero-race">${raceText} ${healthBadge}</div>` : ''}
                </div>
            `;
        }

        // FLIP animation: rows already have their new positions painted (Last) by the time
        // this runs; firstRects holds each row's pre-render position (First), keyed by team id.
        function applyFlipAnimation(tbody, firstRects) {
            requestAnimationFrame(() => {
                tbody.querySelectorAll('tr[data-team-id]').forEach((tr) => {
                    const first = firstRects.get(tr.dataset.teamId);
                    if (!first) return;
                    const last = tr.getBoundingClientRect();
                    const dy = first.top - last.top;
                    if (Math.abs(dy) < 1) return;
                    tr.style.transition = 'none';
                    tr.style.transform = `translateY(${dy}px)`;
                    requestAnimationFrame(() => {
                        tr.style.transition = 'transform 350ms ease';
                        tr.style.transform = '';
                    });
                });
            });
        }

        function render(standings) {
            hideLoading();
            renderHeroCard(standings);

            const tbody = document.getElementById('standingsBody');
            const emptyMsg = document.getElementById('emptyMsg');
            const table = document.getElementById('standingsTable');

            if (!standings || standings.length === 0) {
                table.style.display = 'none';
                emptyMsg.style.display = 'block';
                return;
            }
            table.style.display = 'table';
            emptyMsg.style.display = 'none';

            const firstRects = new Map();
            tbody.querySelectorAll('tr[data-team-id]').forEach((tr) => {
                firstRects.set(tr.dataset.teamId, tr.getBoundingClientRect());
            });

            tbody.innerHTML = '';
            standings.forEach((team) => {
                const tr = document.createElement('tr');
                tr.dataset.teamId = String(team.teamId);
                const rowClasses = [team.wildCardRank <= 3 ? 'wc-in' : 'wc-out'];
                if (team.teamId === DBACKS_TEAM_ID) rowClasses.push('dbacks-row');
                if (team.wildCardRank === 3) rowClasses.push('cutline');
                if (team._justScored) rowClasses.push('score-flash');
                tr.className = rowClasses.join(' ');

                const meta = TEAM_META[team.teamId];
                if (meta) tr.style.setProperty('--team-color', meta.color);

                const streakClass = typeof team.streak === 'string' && team.streak.startsWith('W')
                    ? 'streak-w'
                    : (typeof team.streak === 'string' && team.streak.startsWith('L') ? 'streak-l' : '');

                const logoImg = meta
                    ? `<img class="team-logo" src="${meta.logo}" alt="" loading="lazy" onerror="this.remove()">`
                    : '';

                tr.innerHTML = `
                    <td class="rank-cell" data-label="Rank">${team.wildCardRank}</td>
                    <td data-label="Team"><span class="team-cell">${logoImg}<span>${team.teamName}</span></span></td>
                    <td data-label="W-L">${team.wins}-${team.losses}</td>
                    <td data-label="GB">${team.gamesBack}</td>
                    <td class="${streakClass}" data-label="Streak">${team.streak}</td>
                    <td data-label="Today / Next Game">${formatGameCell(team)}</td>
                `;
                tbody.appendChild(tr);
            });

            applyFlipAnimation(tbody, firstRects);

            tbody.querySelectorAll('tr.score-flash').forEach((tr) => {
                tr.addEventListener('animationend', () => tr.classList.remove('score-flash'), { once: true });
            });
        }

        function hasLiveGames(standings) {
            return standings.some((t) => t.todayGame && t.todayGame.status === 'Live');
        }

        async function refreshAll() {
            if (inFlight) return;
            inFlight = true;
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            try {
                const season = getCurrentSeason();
                const today = todayStr();
                const [standings, todaysGamesMap] = await Promise.all([
                    fetchStandings(season),
                    fetchTodaysGames(today),
                ]);
                await mergeGameDataIntoStandings(standings, todaysGamesMap);

                // Tag teams whose live score changed since the last successful render, so
                // render() can flash just those rows instead of the whole table.
                const prevByTeam = new Map(currentStandings.map((t) => [t.teamId, t]));
                standings.forEach((team) => {
                    const prev = prevByTeam.get(team.teamId);
                    const prevScore = prev?.todayGame ? `${prev.todayGame.awayScore}-${prev.todayGame.homeScore}` : null;
                    const newScore = team.todayGame ? `${team.todayGame.awayScore}-${team.todayGame.homeScore}` : null;
                    team._justScored = prevScore != null && newScore != null && prevScore !== newScore;
                });

                currentStandings = standings;
                clearError();
                render(currentStandings);
                saveCachedSnapshot(currentStandings);
                const cacheNote = document.getElementById('cacheNote');
                if (cacheNote) cacheNote.textContent = '';
                document.getElementById('lastUpdated').textContent =
                    `Last updated: ${new Date().toLocaleTimeString()}`;
            } catch (err) {
                console.error(err);
                if (err instanceof TypeError) {
                    showError('Could not reach the MLB Stats API. This may be a network issue or a cross-origin (CORS) restriction in your browser.');
                } else {
                    showError(`Error loading wild card data: ${err.message}`);
                }
            } finally {
                inFlight = false;
                btn.disabled = false;
                restartPolling();
            }
        }

        function restartPolling() {
            if (pollTimer) clearTimeout(pollTimer);
            if (document.hidden) return;
            const interval = hasLiveGames(currentStandings) ? POLL_LIVE_MS : POLL_IDLE_MS;
            pollTimer = setTimeout(refreshAll, interval);
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (pollTimer) clearTimeout(pollTimer);
            } else {
                refreshAll();
            }
        });

        function init() {
            const cached = loadCachedSnapshot();
            if (cached) {
                currentStandings = cached.standings;
                render(currentStandings);
                const ageMin = Math.max(0, Math.round((Date.now() - cached.savedAt) / 60000));
                const cacheNote = document.getElementById('cacheNote');
                if (cacheNote) {
                    cacheNote.textContent = ageMin === 0
                        ? 'Showing cached data from moments ago — refreshing…'
                        : `Showing cached data from ${ageMin}m ago — refreshing…`;
                }
            }
            refreshAll();
        }

        init();
    </script>
</body>
</html>
